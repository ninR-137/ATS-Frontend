<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Facilities')}"></head>
<body class="app-body">
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<div th:replace="~{fragments/sidebar :: sidebar(page='facilities')}"></div>
<div class="app-main">
  <header class="app-topbar">
    <button id="sidebarToggle" class="topbar-icon-btn mobile-toggle me-2"><i class="fas fa-bars"></i></button>
    <div class="topbar-breadcrumb">
      <p class="topbar-title">Facilities</p>
      <p class="topbar-subtitle">Manage facility accounts and lifecycle states</p>
    </div>
    <div class="topbar-actions d-flex gap-2 align-items-center">
      <div class="input-group input-group-sm" style="max-width:240px;">
        <span class="input-group-text bg-white border-end-0"><i class="fas fa-magnifying-glass fa-sm text-muted"></i></span>
        <input id="facilitySearch" type="text" class="form-control border-start-0" placeholder="Search facilities..." />
      </div>
      <div class="form-check admin-only mb-0" id="includeInactiveWrap" style="display:none;">
        <input class="form-check-input" type="checkbox" id="includeInactive" />
        <label class="form-check-label small" for="includeInactive">Inactive</label>
      </div>
      <a href="/facilities/create" class="btn btn-primary btn-sm admin-only" style="display:none;">Create Facility</a>
    </div>
  </header>

  <main class="app-content">
    <div class="row g-3 mb-4" id="facilityStatsRow">
      <div class="col-6 col-md-3">
        <div class="kpi-card h-100 p-3 text-center d-flex flex-column align-items-center justify-content-center gap-2">
          <div class="kpi-icon-wrap" style="background:#bde5f7;color:#0f5f82;"><i class="fas fa-building"></i></div>
          <div class="kpi-number" id="statTotal">—</div>
          <div class="kpi-label">Total Facilities</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="kpi-card h-100 p-3 text-center d-flex flex-column align-items-center justify-content-center gap-2">
          <div class="kpi-icon-wrap" style="background:#bde5f7;color:#178ec3;"><i class="fas fa-circle-check"></i></div>
          <div class="kpi-number" id="statActive">—</div>
          <div class="kpi-label">Active</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="kpi-card h-100 p-3 text-center d-flex flex-column align-items-center justify-content-center gap-2">
          <div class="kpi-icon-wrap" style="background:#bde5f7;color:#072f41;"><i class="fas fa-box-archive"></i></div>
          <div class="kpi-number" id="statInactive">—</div>
          <div class="kpi-label">Inactive</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="kpi-card h-100 p-3 text-center d-flex flex-column align-items-center justify-content-center gap-2">
          <div class="kpi-icon-wrap" style="background:#bde5f7;color:#3bb2e7;"><i class="fas fa-users"></i></div>
          <div class="kpi-number" id="statApplicants">—</div>
          <div class="kpi-label">Active Applicants</div>
        </div>
      </div>
    </div>

    <div class="row g-3" id="facilityGrid">
      <div class="col-12 text-center py-5 text-muted"><div class="spinner-border text-primary" style="width:1.5rem;height:1.5rem;"></div></div>
    </div>
  </main>
</div>

<script th:inline="javascript">
  /*<![CDATA[*/
  ATS.initPage();

  var allFacilities = [];
  var statsFacilities = [];

  function isFacilityActive(item) {
    if (item == null) return true;
    if (item.isActive !== undefined) return !!item.isActive;
    if (item.active !== undefined) return !!item.active;
    if (item.deletedAt) return false;
    return String(item.status || 'ACTIVE').toUpperCase() !== 'INACTIVE';
  }

  function normalizeFacility(item) {
    return {
      id: item.id || item.facilityId || '',
      name: item.name || item.facilityName || 'Facility',
      location: item.location || item.address || item.facilityLocation || '—',
      email: item.email || item.contactEmail || '',
      isActive: isFacilityActive(item)
    };
  }

  async function loadFacilities() {
    var params = new URLSearchParams();
    var search = document.getElementById('facilitySearch').value.trim();
    var includeInactive = document.getElementById('includeInactive').checked;
    if (search) params.set('search', search);
    if (ATS.isAdmin && includeInactive) params.set('includeInactive', 'true');

    var query = params.toString() ? ('?' + params.toString()) : '';
    var data = await ATS.apiFetch('/facilities' + query);
    allFacilities = (Array.isArray(data) ? data : ((data && (data.content || data.items)) || [])).map(normalizeFacility);

    var statsParams = new URLSearchParams();
    if (search) statsParams.set('search', search);
    if (ATS.isAdmin) statsParams.set('includeInactive', 'true');
    var statsQuery = statsParams.toString() ? ('?' + statsParams.toString()) : '';
    var statsData = await ATS.apiFetch('/facilities' + statsQuery);
    statsFacilities = (Array.isArray(statsData) ? statsData : ((statsData && (statsData.content || statsData.items)) || [])).map(normalizeFacility);

    renderStats();
    renderGrid(allFacilities);
    await loadApplicantCount();
  }

  function renderStats() {
    var source = statsFacilities.length ? statsFacilities : allFacilities;
    document.getElementById('statTotal').textContent = source.length;
    document.getElementById('statActive').textContent = source.filter(function(item) { return item.isActive; }).length;
    document.getElementById('statInactive').textContent = source.filter(function(item) { return !item.isActive; }).length;
  }

  async function loadApplicantCount() {
    try {
      var appData = await ATS.apiFetch('/applicants?size=1');
      document.getElementById('statApplicants').textContent = appData && appData.totalElements != null ? appData.totalElements : '—';
    } catch (err) {
      document.getElementById('statApplicants').textContent = '—';
    }
  }

  function renderGrid(items) {
    var grid = document.getElementById('facilityGrid');
    if (!items.length) {
      grid.innerHTML = '<div class="col-12"><div class="empty-state"><div class="empty-state-icon"><i class="fas fa-building"></i></div><div class="empty-state-title">No facilities found</div></div></div>';
      return;
    }

    grid.innerHTML = items.map(function(facility) {
      var statusHtml = facility.isActive
        ? '<span class="badge bg-success-subtle text-success-emphasis border border-success-subtle">Active</span>'
        : '<span class="badge bg-secondary-subtle text-secondary-emphasis border border-secondary-subtle">Inactive</span>';
      var adminAction = '';
      if (ATS.isAdmin) {
        adminAction = facility.isActive
          ? '<button class="btn btn-sm btn-outline-danger" data-archive-facility="' + facility.id + '"><i class="fas fa-box-archive me-1"></i>Archive</button>'
          : '<button class="btn btn-sm btn-success" data-recover-facility="' + facility.id + '"><i class="fas fa-rotate-left me-1"></i>Recover</button>';
      }

      return '<div class="col-12 col-md-6 col-xl-4">' +
        '<div class="card h-100 facility-grid-card" data-facility-href="/facilities/' + facility.id + '" style="cursor:pointer;">' +
          '<div class="card-body d-flex flex-column gap-3">' +
            '<div class="d-flex justify-content-between align-items-start gap-3">' +
              '<div>' +
                '<div class="fw-semibold" style="font-size:1rem;">' + facility.name + '</div>' +
                '<div class="text-muted small mt-1">' + facility.location + '</div>' +
              '</div>' +
              statusHtml +
            '</div>' +
            (facility.email ? '<div class="text-muted small"><i class="fas fa-envelope me-1"></i>' + facility.email + '</div>' : '') +
            '<div class="d-flex gap-2 mt-auto flex-wrap">' +
              '<a href="/facilities/' + facility.id + '" class="btn btn-sm btn-outline-primary"><i class="fas fa-eye me-1"></i>Open Profile</a>' +
              adminAction +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  document.getElementById('facilitySearch').addEventListener('input', async function() {
    await loadFacilities();
  });

  document.getElementById('includeInactive').addEventListener('change', async function() {
    await loadFacilities();
  });

  document.getElementById('facilityGrid').addEventListener('click', async function(e) {
    var archiveBtn = e.target.closest('[data-archive-facility]');
    if (archiveBtn) {
      e.preventDefault();
      e.stopPropagation();
      var allowArchive = await ATS.confirm('Archive this facility?', { title: 'Archive Facility', confirmText: 'Archive' });
      if (!allowArchive) return;
      var archiveId = archiveBtn.getAttribute('data-archive-facility');
      ATS.setBlockingBusy(true, 'Archiving facility. Please do not refresh or navigate away.');
      try {
        var archiveResponse = await ATS.apiFetch('/admin/facilities/' + archiveId, { method: 'DELETE' });
        ATS.notify('success', (archiveResponse && archiveResponse.message) || 'Facility archived successfully');
        await loadFacilities();
      } catch (err) {
        ATS.notify('danger', err.message || 'Failed to archive facility');
      } finally {
        ATS.setBlockingBusy(false);
      }
      return;
    }

    var recoverBtn = e.target.closest('[data-recover-facility]');
    if (recoverBtn) {
      e.preventDefault();
      e.stopPropagation();
      var allowRecover = await ATS.confirm('Recover this facility?', { title: 'Recover Facility', confirmText: 'Recover' });
      if (!allowRecover) return;
      var recoverId = recoverBtn.getAttribute('data-recover-facility');
      ATS.setBlockingBusy(true, 'Recovering facility. Please do not refresh or navigate away.');
      try {
        var recoverResponse = await ATS.apiFetch('/admin/facilities/' + recoverId + '/recover', { method: 'POST' });
        ATS.notify('success', (recoverResponse && recoverResponse.message) || 'Facility recovered successfully');
        await loadFacilities();
      } catch (err) {
        ATS.notify('danger', err.message || 'Failed to recover facility');
      } finally {
        ATS.setBlockingBusy(false);
      }
      return;
    }

    if (e.target.closest('a,button')) return;
    var card = e.target.closest('[data-facility-href]');
    if (!card) return;
    window.location.href = card.getAttribute('data-facility-href');
  });

  document.getElementById('includeInactiveWrap').style.display = ATS.isAdmin ? 'flex' : 'none';

  loadFacilities().catch(function(err) {
    document.getElementById('facilityGrid').innerHTML = '<div class="col-12 text-danger p-3">' + err.message + '</div>';
  });
  /*]]>*/
</script>
</body>
</html>
