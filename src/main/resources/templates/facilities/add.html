<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Add Facility User')}"></head>
<body class="bg-light">
<div class="container-fluid py-4 dashboard-shell">
    <div class="row g-4">
        <aside class="col-12 col-lg-3">
            <div class="card shadow-lg border-0 rounded-4 admin-sidebar-card">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                             style="width:56px;height:56px;font-size:24px;">
                            <i class="fas fa-briefcase"></i>
                        </div>
                        <h5 class="fw-bold mb-1">Recruitment Management System</h5>
                        <span id="roleBadge" class="badge text-bg-secondary">USER</span>
                    </div>

                    <div class="list-group list-group-flush rounded-3 mb-4">
                        <a href="/dashboard" class="list-group-item list-group-item-action border-0 rounded-3 sidebar-nav-link" data-nav="dashboard">
                            <i class="fas fa-gauge-high me-2"></i>Dashboard
                        </a>
                        <a href="/facilities/create" class="list-group-item list-group-item-action border-0 rounded-3 sidebar-nav-link admin-only" data-nav="create-facility">
                            <i class="fas fa-square-plus me-2"></i>Create Facility
                        </a>
                        <a href="/facilities/add" class="list-group-item list-group-item-action border-0 rounded-3 sidebar-nav-link active admin-only" data-nav="add-facility-user">
                            <i class="fas fa-user-plus me-2"></i>Add Facility User
                        </a>
                        <a href="/admin-requests/pending" class="list-group-item list-group-item-action border-0 rounded-3 sidebar-nav-link admin-only" data-nav="admin-requests">
                            <i class="fas fa-user-shield me-2"></i>Admin Requests
                        </a>
                    </div>

                    <button id="logoutBtn" class="btn btn-outline-secondary w-100">
                        <i class="fas fa-right-from-bracket me-2"></i>Logout
                    </button>
                </div>
            </div>
        </aside>

        <main class="col-12 col-lg-9">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="bg-warning text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2"
                             style="width:56px;height:56px;font-size:24px;">
                            <i class="fas fa-user-check"></i>
                        </div>
                        <h3 class="fw-bold mb-1">Add User To Facility</h3>
                        <p class="text-muted mb-0">Admin-only action. Assign an existing user email to a facility.</p>
                    </div>

                    <form id="addUserForm" class="row g-3">
                        <div class="col-12">
                            <label for="facilityId" class="form-label fw-semibold">Facility</label>
                            <select id="facilityId" class="form-select form-select-lg" required>
                                <option value="">Select facility...</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label for="email" class="form-label fw-semibold">User Email</label>
                            <input id="email" type="email" class="form-control form-control-lg" placeholder="user@example.com" required />
                        </div>
                        <div class="col-12 d-grid d-md-flex justify-content-md-end">
                            <button id="submitBtn" type="submit" class="btn btn-warning px-4 text-white">
                                <span class="spinner-border spinner-border-sm d-none me-2" id="submitSpinner"></span>
                                Add User
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script th:inline="javascript">
    const token = localStorage.getItem('jwt_token');

    if (!token) {
        window.location.href = '/login';
    }

    function parseJwt(jwt) {
        try {
            const payloadPart = jwt.split('.')[1] || '';
            const normalized = payloadPart.replace(/-/g, '+').replace(/_/g, '/');
            const padLen = (4 - (normalized.length % 4)) % 4;
            return JSON.parse(atob(normalized + '='.repeat(padLen)));
        } catch (e) {
            return {};
        }
    }

    function collectNormalizedRoles(values) {
        const queue = Array.isArray(values) ? [...values] : [values];
        const normalized = [];

        while (queue.length) {
            const item = queue.shift();
            if (!item) {
                continue;
            }

            if (Array.isArray(item)) {
                queue.push(...item);
                continue;
            }

            if (typeof item === 'string') {
                const parts = item.split(',').map(p => p.trim()).filter(Boolean);
                normalized.push(...parts.map(p => p.toUpperCase()));
                continue;
            }

            if (typeof item === 'object') {
                queue.push(item.role, item.name, item.authority, item.value);
            }
        }

        return [...new Set(normalized)];
    }

    function hasAdminRole(roleList) {
        return roleList.some(role => role === 'ADMIN' || role === 'ROLE_ADMIN' || role.endsWith('_ADMIN'));
    }

    function notifyUser(type, message) {
        if (typeof window.appNotify === 'function') {
            window.appNotify(type, message);
        }
    }

    function clearNotifications() {
        if (typeof window.clearAppNotifications === 'function') {
            window.clearAppNotifications();
        }
    }

    async function apiFetch(path, options = {}) {
        const config = {
            ...options,
            headers: {
                Authorization: `Bearer ${token}`,
                ...(options.body ? {'Content-Type': 'application/json'} : {}),
                ...(options.headers || {})
            }
        };

        const res = await fetch(`${ATS.API_BASE}${path}`, config);
        const text = await res.text();
        let data = null;

        if (text) {
            try {
                data = JSON.parse(text);
            } catch (e) {
                data = text;
            }
        }

        if (!res.ok) {
            const message = (data && (data.message || data.error)) || `Request failed (${res.status})`;
            const err = new Error(message);
            err.status = res.status;
            throw err;
        }

        return data;
    }

    function normalizeFacility(item) {
        return {
            id: item.id ?? item.facilityId ?? item.facility?.id ?? '',
            name: item.name ?? item.facilityName ?? item.facility?.name ?? 'Unknown'
        };
    }

    const claims = parseJwt(token);
    let storedUserInfo = {};
    try {
        storedUserInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
    } catch (e) {
        storedUserInfo = {};
    }

    const roles = collectNormalizedRoles([
        claims.role,
        claims.roles,
        claims.authorities,
        claims.scope,
        claims.scopes,
        storedUserInfo.role,
        storedUserInfo.roles,
        storedUserInfo.authorities
    ]);

    let isAdmin = hasAdminRole(roles);

    function applyRoleUiState() {
        const roleBadge = document.getElementById('roleBadge');
        roleBadge.textContent = isAdmin ? 'ADMIN' : 'USER';
        roleBadge.className = isAdmin ? 'badge text-bg-danger' : 'badge text-bg-primary';

        document.querySelectorAll('.admin-only').forEach(el => {
            el.style.display = isAdmin ? '' : 'none';
        });

        document.getElementById('submitBtn').disabled = !isAdmin;

        if (!isAdmin) {
            notifyUser('warning', 'Only admins can add users to facilities.');
        }
    }

    document.getElementById('logoutBtn').addEventListener('click', function () {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('user_info');
        window.location.href = '/login';
    });

    function extractFacilityList(payload) {
        if (Array.isArray(payload)) {
            return payload;
        }
        if (payload && Array.isArray(payload.content)) {
            return payload.content;
        }
        if (payload && Array.isArray(payload.items)) {
            return payload.items;
        }
        if (payload && Array.isArray(payload.data)) {
            return payload.data;
        }
        return [];
    }

    async function resolveAdminAccess() {
        if (isAdmin) {
            return;
        }

        try {
            await apiFetch('/admin-requests/pending');
            isAdmin = true;
            applyRoleUiState();
            clearNotifications();
        } catch (err) {
            if (err && err.status === 401) {
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('user_info');
                window.location.href = '/login';
                return;
            }
        }
    }

    async function loadFacilities() {
        if (!isAdmin) {
            return;
        }

        clearNotifications();
        const select = document.getElementById('facilityId');
        select.innerHTML = '<option value="">Loading facilities...</option>';

        try {
            let payload;
            try {
                payload = await apiFetch('/admin/facilities');
            } catch (adminErr) {
                payload = await apiFetch('/facilities');
            }

            const rows = extractFacilityList(payload)
                .map(normalizeFacility)
                .filter(f => f.id !== null && f.id !== undefined && String(f.id).trim() !== '');

            if (!rows.length) {
                select.innerHTML = '<option value="">No facilities available</option>';
                return;
            }

            select.innerHTML = '<option value="">Select facility...</option>' + rows
                .map(f => `<option value="${f.id}">${f.name}</option>`)
                .join('');
        } catch (err) {
            select.innerHTML = '<option value="">Failed to load facilities</option>';
            notifyUser('danger', err.message || 'Failed to load facilities.');
        }
    }

    document.getElementById('addUserForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        if (!isAdmin) {
            return;
        }

        clearNotifications();
        const facilityId = document.getElementById('facilityId').value;
        const email = document.getElementById('email').value.trim();
        const spinner = document.getElementById('submitSpinner');
        const btn = document.getElementById('submitBtn');

        if (!facilityId || !email) {
            notifyUser('warning', 'Facility and user email are required.');
            return;
        }

        spinner.classList.remove('d-none');
        btn.disabled = true;

        try {
            await apiFetch(`/admin/facilities/${facilityId}/addUser`, {
                method: 'POST',
                body: JSON.stringify({email})
            });
            notifyUser('success', 'User added to facility successfully.');
            document.getElementById('email').value = '';
        } catch (err) {
            notifyUser('danger', err.message || 'Failed to add user to facility.');
        } finally {
            spinner.classList.add('d-none');
            btn.disabled = false;
        }
    });

    (async function initPage() {
        applyRoleUiState();
        await resolveAdminAccess();
        applyRoleUiState();
        await loadFacilities();
    })();
</script>
</body>
</html>
