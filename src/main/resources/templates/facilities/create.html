<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Create Facility')}"></head>
<body class="app-body">
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<div th:replace="~{fragments/sidebar :: sidebar(page='create-facility')}"></div>
<div class="app-main">
  <header class="app-topbar">
    <button id="sidebarToggle" class="topbar-icon-btn mobile-toggle me-2"><i class="fas fa-bars"></i></button>
    <div class="topbar-breadcrumb">
      <p class="topbar-title">Create Facility</p>
      <p class="topbar-subtitle">Add a new facility to the recruitment system</p>
    </div>
    <div class="topbar-actions">
      <a href="/dashboard" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Back</a>
    </div>
  </header>

  <main class="app-content">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-8">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white border-bottom py-3">
            <h6 class="mb-0 fw-semibold">Facility Details</h6>
          </div>
          <div class="card-body p-4 p-lg-5">
            <div class="mb-4">
              <h2 class="h4 mb-1">Create New Facility</h2>
              <p class="text-muted mb-0">This admin-only action creates a facility that can be assigned to users and applicants.</p>
            </div>

            <form id="createFacilityForm" class="row g-3" novalidate>
              <div class="col-12">
                <label for="name" class="form-label fw-semibold">Facility Name</label>
                <input id="name" class="form-control form-control-lg" placeholder="Main Clinic" required />
              </div>
              <div class="col-12">
                <label for="location" class="form-label fw-semibold">Location</label>
                <input id="location" class="form-control form-control-lg" placeholder="City, State" required />
              </div>
              <div class="col-12 d-flex justify-content-end gap-2 pt-2">
                <a href="/dashboard" class="btn btn-outline-secondary">Cancel</a>
                <button id="submitBtn" type="submit" class="btn btn-primary admin-only" style="display:none;">
                  <span class="spinner-border spinner-border-sm d-none me-2" id="submitSpinner"></span>
                  Create Facility
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script th:inline="javascript">
  /*<![CDATA[*/
  var pageInfo = ATS.initPage();

  document.getElementById('createFacilityForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    if (!ATS.isAdmin) {
      ATS.notify('warning', 'Only admins can create facilities.');
      return;
    }

    var name = document.getElementById('name').value.trim();
    var location = document.getElementById('location').value.trim();
    var spinner = document.getElementById('submitSpinner');
    var btn = document.getElementById('submitBtn');

    if (!name || !location) {
      ATS.notify('warning', 'Facility name and location are required.');
      return;
    }

    spinner.classList.remove('d-none');
    btn.disabled = true;

    try {
      await ATS.apiFetch('/admin/facilities/add', {
        method: 'POST',
        body: JSON.stringify({ name: name, location: location })
      });
      ATS.notify('success', 'Facility created successfully.');
      e.target.reset();
    } catch (err) {
      ATS.notify('danger', err.message || 'Failed to create facility.');
    } finally {
      spinner.classList.add('d-none');
      btn.disabled = false;
    }
  });

  document.addEventListener('ats:access-changed', function () {
    if (!ATS.isAdmin) {
      return;
    }
    var submitBtn = document.getElementById('submitBtn');
    if (submitBtn) {
      submitBtn.style.display = '';
    }
  });

  if (!pageInfo.isAdmin) {
    ATS.notify('warning', 'Only admins can create facilities.');
  }
  /*]]>*/
</script>
</body>
</html>
