<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Create Account')}"></head>
<body style="background:var(--gray-50);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;">

<div class="card" style="width:460px;max-width:95vw;padding:2rem;">
    <div class="mb-4">
        <div style="width:48px;height:48px;background:var(--primary-light);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--primary);margin-bottom:1rem;">
            <i class="fas fa-user-plus"></i>
        </div>
        <h4 class="fw-bold mb-1" style="color:var(--gray-900);">Create your account</h4>
        <p class="text-muted mb-0" style="font-size:0.875rem;">Sign up to start using RMS.</p>
    </div>

        <form id="registerForm" novalidate>
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Your username" required/>
                </div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control" id="email" placeholder="you@example.com" required/>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Create password" required/>
                    <button class="btn btn-outline-secondary" type="button" id="togglePass">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-check text-muted"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required/>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="registerBtn" style="padding:0.65rem;">
                <span class="spinner-border spinner-border-sm d-none me-2" id="registerSpinner"></span>
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
        </form>

        <hr class="my-4"/>
        <p class="text-center text-muted mb-0" style="font-size:0.85rem;">
            Already have an account?
            <a href="/login" class="fw-semibold text-decoration-none" style="color:var(--primary);">Sign in</a>
        </p>
</div>

<script th:inline="javascript">
    function notifyUser(type, message) {
        if (typeof window.appNotify === 'function') {
            window.appNotify(type, message);
        }
    }

    function clearNotifications() {
        if (typeof window.clearAppNotifications === 'function') {
            window.clearAppNotifications();
        }
    }

    document.getElementById('togglePass').addEventListener('click', function () {
        const passField = document.getElementById('password');
        const icon = this.querySelector('i');
        if (passField.type === 'password') {
            passField.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passField.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const spinner = document.getElementById('registerSpinner');
        const btn = document.getElementById('registerBtn');

        if (!username || !email || !password || !confirmPassword) {
            notifyUser('warning', 'Please fill in all fields.');
            return;
        }

        if (password !== confirmPassword) {
            notifyUser('warning', 'Passwords do not match.');
            return;
        }

        spinner.classList.remove('d-none');
        btn.disabled = true;
        clearNotifications();

        try {
            const res = await fetch(`${ATS.API_BASE}/auth/signup`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, email, password})
            });

            let data = null;
            try {
                data = await res.json();
            } catch (parseErr) {
                data = null;
            }

            if (!res.ok) {
                const message = (data && (data.message || data.error)) || 'Registration failed';
                throw new Error(message);
            }

            notifyUser('success', 'Account created. Please verify your email.');
            setTimeout(() => window.location.href = `/verify?email=${encodeURIComponent(email)}`, 1200);
        } catch (err) {
            notifyUser('danger', err.message || 'Registration failed. Please try again.');
        } finally {
            spinner.classList.add('d-none');
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
